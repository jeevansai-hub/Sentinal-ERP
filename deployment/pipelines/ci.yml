# ERP7 — CI Pipeline
# Runs on every pull request and push to main
# Stages: Lint → Type Check → Security Scan → Unit Tests → Integration Tests → Build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'

jobs:
  # ─── Stage 1: Code Quality ──────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript type check
        run: npm run type-check
      - name: Prettier format check
        run: npm run format:check

  # ─── Stage 2: Security Scan ─────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
      - name: SAST scan (CodeQL)
        uses: github/codeql-action/analyze@v3
        with:
          languages: typescript

  # ─── Stage 3: Unit Tests ────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests
        run: npm run test:unit -- --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4

  # ─── Stage 4: Integration Tests ─────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: erp7_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: erp7_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run migrations (test DB)
        run: npm run db:migrate
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: erp7_test
          DATABASE_USER: erp7_test
          DATABASE_PASSWORD: test_password
      - name: Run integration tests
        run: npm run test:integration

  # ─── Stage 5: Build ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build API
        run: cd apps/api && npm run build
      - name: Build Web
        run: cd apps/web && npm run build
      - name: Build Docker images
        run: |
          docker build -f infrastructure/docker/Dockerfile.api -t erp7-api:${{ github.sha }} .
          docker build -f infrastructure/docker/Dockerfile.web -t erp7-web:${{ github.sha }} .

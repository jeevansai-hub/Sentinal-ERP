# Sentinel ERP AI Agent Registry Specification
# Configured in accordance with the agent_registry_schema properties.

agents:
  - agent_id: "agent-1"
    agent_name: "Lead Qualifier Agent"
    agent_version: "1.0.0"
    agent_type: "task"
    department: "Sales"
    owner: "Sales Operations"
    status: "Nominal"
    priority: "High"
    permissions:
      - "crm:read"
      - "crm:write"
    allowed_tools:
      - "CRM Deals Reader"
    memory_profile:
      window_size: 10
      vector_store_ref: "sales_leads_embeddings"
    knowledge_sources:
      - "corporate_lead_profile_rules.pdf"
    model: "gemini-2.5-flash"
    temperature: 0.2
    max_tokens: 1024
    cost_limit: 0.02
    responsibilities: "Automate leads sorting, profile checks, and initial CRM status classification."
    inputs: "JSON payload containing email, company size, and request message."
    outputs: "Deal stage tag, prioritization score, owner assignment recommendation."
    events:
      - "Event: Lead Created"
    dependencies: []
    approval_rules: "Automated qualification. Manual override allowed for Admin."
    escalation_rules: "Escalate to Sales Manager if qualification confidence < 85%."
    fallback_rules: "Degrade task parameters and delegate to Coordinator Agent."

  - agent_id: "agent-2"
    agent_name: "Sales Closer Agent"
    agent_version: "1.0.0"
    agent_type: "reasoning"
    department: "Sales"
    owner: "Sales Operations"
    status: "Nominal"
    priority: "Standard"
    permissions:
      - "crm:read"
      - "crm:write"
      - "finance:read"
    allowed_tools:
      - "CRM Deals Reader"
      - "DocGen Contract Tool"
    memory_profile:
      window_size: 15
      vector_store_ref: "sales_contracts_embeddings"
    knowledge_sources:
      - "standard_contract_clauses.pdf"
      - "discounting_policy.pdf"
    model: "gemini-2.5-pro"
    temperature: 0.3
    max_tokens: 2048
    cost_limit: 0.05
    responsibilities: "Generate custom sales contracts and draft legal agreements."
    inputs: "Deal metrics, client requirements, discounting requests."
    outputs: "Custom PDF contract draft, discount approvals recommendations."
    events:
      - "Event: Deal Negotiating"
    dependencies:
      - "agent-1"
    approval_rules: "Discounts between 15% and 25% require Finance Manager approval."
    escalation_rules: "Discounts above 25% escalate to VP of Sales."
    fallback_rules: "Alert account executive, route to draft queue."

  - agent_id: "agent-3"
    agent_name: "Finance Auditor Agent"
    agent_version: "1.0.0"
    agent_type: "analytical"
    department: "Finance"
    owner: "Finance Ops"
    status: "Nominal"
    priority: "Critical"
    permissions:
      - "finance:read"
      - "finance:write"
    allowed_tools:
      - "Ledger Auditor"
      - "Invoices Reader"
    memory_profile:
      window_size: 30
      vector_store_ref: "ledger_reconciliation_embeddings"
    knowledge_sources:
      - "double_entry_bookkeeping_rules.pdf"
      - "corporate_reconciliation_guideline.pdf"
    model: "gemini-2.5-pro"
    temperature: 0.1
    max_tokens: 4096
    cost_limit: 0.10
    responsibilities: "Audit ledgers, verify invoices billing entries, and run reconciliation loops."
    inputs: "General ledger entries collection, invoices transaction rows."
    outputs: "Audited status statement, discrepancy records."
    events:
      - "Event: Invoice Created"
      - "Event: Invoice Overdue"
    dependencies: []
    approval_rules: "Adjustments above ₹5,00,000 require CFO manual sign-off."
    escalation_rules: "Escalate to CFO if audit latency exceeds 48 hours."
    fallback_rules: "Pause execution trace, log error, and raise flag on Dashboard."

  - agent_id: "agent-4"
    agent_name: "Coordinator Agent"
    agent_version: "1.0.0"
    agent_type: "coordinator"
    department: "Operations"
    owner: "ERP Systems Administrator"
    status: "Nominal"
    priority: "Critical"
    permissions:
      - "workflows:read"
      - "workflows:write"
    allowed_tools:
      - "Workflows Controller"
    memory_profile:
      window_size: 20
      vector_store_ref: "workflow_configurations"
    knowledge_sources:
      - "system_workflow_diagrams.pdf"
    model: "gemini-2.5-flash"
    temperature: 0.1
    max_tokens: 2048
    cost_limit: 0.05
    responsibilities: "Manage multi-agent collaboration matrices and route tasks based on parsed plans."
    inputs: "User plain-text prompt or workflow events."
    outputs: "Multi-agent routing execution paths."
    events: []
    dependencies: []
    approval_rules: "System changes require Admin review."
    escalation_rules: "Escalate to System Architect if routing loops fail twice."
    fallback_rules: "Revert workflow state and trigger alert."

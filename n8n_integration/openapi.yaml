openapi: 3.0.3
info:
  title: Sentinel ERP n8n Integration Gateway API
  description: REST and Webhook interfaces linking n8n multi-agent runners, pgvector systems, and Sentinel ERP backend. All requests require Firebase JWT token auth.
  version: 1.0.0
servers:
  - url: https://api.sentinel-erp.internal/v1
    description: Internal Cluster Gateway API
paths:
  /hr/employees:
    get:
      summary: Retrieve Employee Profiles
      description: Returns a list of employee profiles filtered by department boundaries. Used by HR Agents for context gathering.
      security:
        - BearerAuth: []
      parameters:
        - name: department
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of employee records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hr/leaves:
    get:
      summary: Retrieve Pending Leaves
      description: Fetches leave requests awaiting processing.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of leave applications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaveRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /crm/deals:
    get:
      summary: List Sales Deals
      description: Fetches customer deals from CRM pipeline.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Active CRM deals.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deal'
    post:
      summary: Create CRM Deal
      description: Inserts a newly qualified sales lead as a pipeline deal.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - status
                - priority
              properties:
                title:
                  type: string
                status:
                  type: string
                  enum: [Lead, Qualified, Negotiating, Won, Lost]
                priority:
                  type: string
                  enum: [Low, Standard, High, Critical]
                company:
                  type: string
                contact_email:
                  type: string
      responses:
        '201':
          description: Deal created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'

  /crm/tickets:
    get:
      summary: List Support Tickets
      description: Retrieves unresolved ticketing queues.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Support tickets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'

  /finance/ledgers:
    get:
      summary: Get Transactional Ledger
      description: Queries bookkeeping items. Used for audits.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: General ledger rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LedgerEntry'

  /finance/ledgers/adjust:
    post:
      summary: Submit Ledger Correction
      description: Performs audit adjustment of transaction lines. Requires CFO approval if adjustment exceeds ₹5,00,000.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adjustments
              properties:
                adjustments:
                  type: array
                  items:
                    type: object
                    required:
                      - ledger_id
                      - amount
                      - correction_reason
                    properties:
                      ledger_id:
                        type: string
                      amount:
                        type: number
                      correction_reason:
                        type: string
      responses:
        '200':
          description: Adjustments successfully queued or executed.

  /finance/invoices:
    get:
      summary: Query Invoices
      description: Fetches transaction records representing billing states.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of invoices.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'

  /procurement/vendors:
    get:
      summary: Query Contracted Vendors
      description: Queries valid supplier agreements directory.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Supplier profiles list.

  /procurement/rfqs:
    get:
      summary: Query RFQs
      description: Retrieves RFQ templates and active drafts.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: RFQ metrics list.

  /workflows/definitions:
    get:
      summary: Retrieve Registered Workflows
      description: Fetches metadata schema for system workflows.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Active workflows list.

  /workflows/metrics:
    get:
      summary: Get Execution Traces
      description: Audits performance delays and manual task metrics.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Workflow telemetry records.

  # Webhook triggers configured to ingest events into n8n workflows
  /webhook/crm/lead-created:
    post:
      summary: Lead Ingestion Trigger
      description: Receives contact form payload from web server and schedules flow-crm-lead-qualification workflow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company
                - contact_email
                - request_message
              properties:
                company:
                  type: string
                contact_email:
                  type: string
                request_message:
                  type: string
                lead_source:
                  type: string
      responses:
        '202':
          description: Ingestion job scheduled.

  /webhook/finance/invoice-overdue:
    post:
      summary: Invoice Overdue Check Trigger
      description: Alerts n8n about an unpaid overdue invoice to run reconciliation audit flows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoice_id
                - amount
                - due_days
              properties:
                invoice_id:
                  type: string
                amount:
                  type: number
                due_days:
                  type: integer
      responses:
        '202':
          description: Audit routine queued.

  /webhook/inventory/stock-alert:
    post:
      summary: Stock Reorder Level Alerts
      description: Triggers Procurement RFQ automation workflows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - item_id
                - current_balance
                - reorder_threshold
              properties:
                item_id:
                  type: string
                current_balance:
                  type: number
                reorder_threshold:
                  type: number
      responses:
        '202':
          description: Reorder routine scheduled.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Access token missing, invalid, or expired.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized
              message:
                type: string
                example: JWT verification failed
  schemas:
    Employee:
      type: object
      properties:
        employee_id:
          type: string
        name:
          type: string
        department:
          type: string
        email:
          type: string
    LeaveRequest:
      type: object
      properties:
        leave_id:
          type: string
        employee_id:
          type: string
        days_requested:
          type: integer
        status:
          type: string
          example: Pending
    Deal:
      type: object
      properties:
        deal_id:
          type: string
        title:
          type: string
        status:
          type: string
        priority:
          type: string
        company:
          type: string
    Ticket:
      type: object
      properties:
        ticket_id:
          type: string
        title:
          type: string
        status:
          type: string
    LedgerEntry:
      type: object
      properties:
        ledger_id:
          type: string
        account_id:
          type: string
        debit:
          type: number
        credit:
          type: number
        timestamp:
          type: string
    Invoice:
      type: object
      properties:
        invoice_id:
          type: string
        amount:
          type: number
        status:
          type: string
